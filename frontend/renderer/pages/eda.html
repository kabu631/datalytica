<div>
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <h2>Exploratory Data Analysis</h2>
    <button class="btn btn-primary" onclick="loadEDA()">Run Full Analysis</button>
  </div>
  
  <div id="eda-status" style="font-weight:bold; margin-bottom: 20px;"></div>

  <div id="eda-content" style="display:none;">
    
    <!-- AI Insights -->
    <div class="card" style="border-left: 4px solid var(--primary);">
      <h3>💡 AI Insights</h3>
      <div id="ai-insights-content" style="font-size: 1.1rem; line-height: 1.6; margin-top: 10px;"></div>
    </div>

    <!-- Summary Grid -->
    <h3>Summary Statistics</h3>
    <div class="grid-cards" id="summary-grid"></div>

    <!-- Numeric & Categorical Tabs/Grid -->
    <div style="display:flex; gap: 20px; margin-bottom:20px;">
      <div class="card" style="flex:1;">
        <h3>Numeric Variables</h3>
        <div style="max-height: 300px; overflow-y: auto;">
          <table id="numeric-table">
            <thead>
              <tr><th>Column</th><th>Mean</th><th>Std</th><th>Min</th><th>Max</th><th>Nulls</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
      
      <div class="card" style="flex:1;">
        <h3>Categorical Variables</h3>
        <div style="max-height: 300px; overflow-y: auto;">
          <table id="categorical-table">
            <thead>
              <tr><th>Column</th><th>Unique</th><th>Top Value</th><th>Freq</th><th>Nulls</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Charts -->
    <div class="card">
      <h3>Correlation Heatmap</h3>
      <div id="corr-heatmap" style="height: 500px; width: 100%;"></div>
    </div>

  </div>

  <script>
    window.addEventListener('dataset-changed', () => {
      document.getElementById('eda-content').style.display = 'none';
      document.getElementById('eda-status').innerText = '';
    });

    async function loadEDA() {
      if (!window.appState.activeDatasetId) {
        alert("Please select a dataset first.");
        return;
      }
      
      const status = document.getElementById('eda-status');
      status.innerText = "Computing statistics & AI insights (this may take a few moments)...";
      status.style.color = "var(--text)";
      document.getElementById('eda-content').style.display = 'none';
      
      try {
        const res = await window.api.get(`/eda/full/${window.appState.activeDatasetId}`);
        
        status.innerText = "Analysis Complete!";
        status.style.color = "var(--success)";
        document.getElementById('eda-content').style.display = 'block';
        
        renderEDA(res.raw_stats, res.ai_insights);
      } catch (err) {
        status.innerText = "Error: " + err.message;
        status.style.color = "var(--danger)";
      }
    }

    function renderEDA(stats, insights) {
      // AI
      document.getElementById('ai-insights-content').innerHTML = insights.replace(/\n/g, '<br/>');
      
      // Summary
      const summaryHTML = `
        <div class="stat-card">
          <div class="label">Total Rows</div>
          <div class="value">${stats.summary.row_count.toLocaleString()}</div>
        </div>
        <div class="stat-card">
          <div class="label">Total Columns</div>
          <div class="value">${stats.summary.column_count}</div>
        </div>
        <div class="stat-card">
          <div class="label">Memory Usage</div>
          <div class="value">${stats.summary.memory_mb} MB</div>
        </div>
        <div class="stat-card">
          <div class="label">Duplicate Rows</div>
          <div class="value">${stats.summary.duplicate_rows.toLocaleString()}</div>
        </div>
      `;
      document.getElementById('summary-grid').innerHTML = summaryHTML;
      
      // Numeric
      const numTbody = document.querySelector('#numeric-table tbody');
      numTbody.innerHTML = Object.entries(stats.numeric_stats).map(([col, data]) => `
        <tr>
          <td><strong>${col}</strong></td>
          <td>${data.mean.toFixed(2)}</td>
          <td>${data.std.toFixed(2)}</td>
          <td>${data.min.toFixed(2)}</td>
          <td>${data.max.toFixed(2)}</td>
          <td>${data.null_count} (${data.null_pct.toFixed(1)}%)</td>
        </tr>
      `).join('');
      
      // Categorical
      const catTbody = document.querySelector('#categorical-table tbody');
      catTbody.innerHTML = Object.entries(stats.categorical_stats).map(([col, data]) => `
        <tr>
          <td><strong>${col}</strong></td>
          <td>${data.unique_count}</td>
          <td>${data.top_value || '-'}</td>
          <td>${data.top_freq}</td>
          <td>${data.null_count}</td>
        </tr>
      `).join('');
      
      // Correlation Heatmap via Plotly
      if (stats.correlations.matrix && stats.correlations.matrix.length > 0) {
        const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        const fontColor = isDark ? '#f0f0f0' : '#333333';
        
        const layout = {
          margin: { t: 30, r: 0, b: 80, l: 80 },
          paper_bgcolor: 'rgba(0,0,0,0)',
          plot_bgcolor: 'rgba(0,0,0,0)',
          font: { color: fontColor }
        };
        const data = [{
          z: stats.correlations.matrix,
          x: stats.correlations.columns,
          y: stats.correlations.columns,
          type: 'heatmap',
          colorscale: 'RdBu',
          zmin: -1, zmax: 1
        }];
        Plotly.newPlot('corr-heatmap', data, layout);
      } else {
        document.getElementById('corr-heatmap').innerHTML = '<p class="text-muted">Not enough numeric columns for correlation.</p>';
      }
    }
  </script>
</div>
